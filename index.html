<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TeamFlow – Task Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --accent3: #43e8a0;
      --text: #f0f0fa;
      --muted: #7a7a9a;
      --danger: #ff4757;
      --warn: #ffa502;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(108,99,255,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(255,101,132,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(67,232,160,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 8px 32px rgba(108,99,255,0.4);
    }

    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo h1 span { color: var(--accent); }

    .logo p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      backdrop-filter: blur(10px);
    }

    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 9px;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #8b63ff);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(108,99,255,0.35);
      margin-top: 8px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(108,99,255,0.5);
    }

    .btn-primary:active { transform: translateY(0); }

    .error-msg {
      background: rgba(255,71,87,0.12);
      border: 1px solid rgba(255,71,87,0.3);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Particles -->
  <div class="particle" style="width:4px;height:4px;background:rgba(108,99,255,0.5);left:15%;animation-duration:12s;animation-delay:0s;"></div>
  <div class="particle" style="width:6px;height:6px;background:rgba(255,101,132,0.4);left:35%;animation-duration:16s;animation-delay:3s;"></div>
  <div class="particle" style="width:3px;height:3px;background:rgba(67,232,160,0.5);left:60%;animation-duration:10s;animation-delay:6s;"></div>
  <div class="particle" style="width:5px;height:5px;background:rgba(108,99,255,0.3);left:80%;animation-duration:14s;animation-delay:1s;"></div>

  <div class="auth-container">
    <div class="logo">
      <div class="logo-mark">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>Team<span>Flow</span></h1>
        </div>
      </div>
      <p>Team Task Management</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="error-box" class="error-msg"></div>

      <!-- Login Form -->
      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In →</button>
      </div>

      <!-- Signup Form -->
      <div id="signup-form" style="display:none;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-pass" placeholder="Min 6 characters" />
        </div>
        <button class="btn-primary" id="signup-btn" onclick="handleSignup()">Create Account →</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ⚠️  REPLACE with your Firebase config
    const firebaseConfig = {
  apiKey: "AIzaSyAM0UElwZWTxB5SUs_z6SaMr4fSyTC8W04",
  authDomain: "teamflow-35004.firebaseapp.com",
  projectId: "teamflow-35004",
  storageBucket: "teamflow-35004.firebasestorage.app",
  messagingSenderId: "737268354860",
  appId: "1:737268354860:web:3ffaade094283d664b6689",
  measurementId: "G-W11LEY0HD3"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Expose to global
    window._auth = auth;
    window._db = db;
    window._fbModules = { createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, doc, setDoc, getDoc };

    // Auto-redirect if logged in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });
  </script>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1)));
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('error-box').style.display = 'none';
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      if (!email || !pass) return showError('Please fill in all fields.');
      document.getElementById('login-btn').classList.add('loading');
      try {
        await window._fbModules.signInWithEmailAndPassword(window._auth, email, pass);
        window.location.href = 'dashboard.html';
      } catch(e) {
        showError(e.message.replace('Firebase: ', '').replace(/\(.*\)/, ''));
      }
      document.getElementById('login-btn').classList.remove('loading');
    }

    async function handleSignup() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const pass = document.getElementById('signup-pass').value;
      if (!name || !email || !pass) return showError('Please fill in all fields.');
      if (pass.length < 6) return showError('Password must be at least 6 characters.');
      document.getElementById('signup-btn').classList.add('loading');
      try {
        const { user } = await window._fbModules.createUserWithEmailAndPassword(window._auth, email, pass);
        await window._fbModules.updateProfile(user, { displayName: name });
        await window._fbModules.setDoc(window._fbModules.doc(window._db, 'users', user.uid), {
          name, email, uid: user.uid, createdAt: new Date().toISOString()
        });
        window.location.href = 'dashboard.html';
      } catch(e) {
        showError(e.message.replace('Firebase: ', '').replace(/\(.*\)/, ''));
      }
      document.getElementById('signup-btn').classList.remove('loading');
    }
  </script>
</body>
</html>
